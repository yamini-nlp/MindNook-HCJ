        .ql-picker.ql-font .ql-picker-label[data-value="big-caslon"]::before,.ql-picker.ql-font .ql-picker-item[data-value="big-caslon"]::before{content:'Big Caslon'!important;font-family:'Big Caslon',serif}
        .ql-picker.ql-font .ql-picker-label[data-value="bradley-hand"]::before,.ql-picker.ql-font .ql-picker-item[data-value="bradley-hand"]::before{content:'Bradley Hand'!important;font-family:'Bradley Hand',cursive}
        .ql-picker.ql-font .ql-picker-label[data-value="chalkduster"]::before,.ql-picker.ql-font .ql-picker-item[data-value="chalkduster"]::before{content:'Chalkduster'!important;font-family:'Chalkduster',cursive}
        .ql-picker.ql-font .ql-picker-label[data-value="copperplate"]::before,.ql-picker.ql-font .ql-picker-item[data-value="copperplate"]::before{content:'Copperplate'!important;font-family:'Copperplate',serif}

        .ql-picker.ql-font .ql-picker-label[data-value="market-felt"]::before,.ql-picker.ql-font .ql-picker-item[data-value="market-felt"]::before{content:'Market Felt'!important;font-family:'Market Felt',cursive}
        .ql-picker.ql-font .ql-picker-label[data-value="luminari"]::before,.ql-picker.ql-font .ql-picker-item[data-value="luminari"]::before{content:'Luminari'!important;font-family:'Luminari',fantasy}
        .ql-picker.ql-font .ql-picker-label[data-value="noteworthy"]::before,.ql-picker.ql-font .ql-picker-item[data-value="noteworthy"]::before{content:'Noteworthy'!important;font-family:'Noteworthy',sans-serif}
        .ql-picker.ql-font .ql-picker-label[data-value="palatino"]::before,.ql-picker.ql-font .ql-picker-item[data-value="palatino"]::before{content:'Palatino'!important;font-family:'Palatino',serif}

        @media(max-width:900px){

<body>
    <div id="picker-view" class="canvas-picker-view">
        <h1 class="picker-headline">Select Your <em>Canvas</em></h1>
        <p class="picker-sub">Choose a style that matches your mood today</p>
        <div class="page-title-rule"></div>
        <div class="canvas-grid" id="canvas-grid"></div>
        <div class="picker-footer-nav">
            <a href="dashboard.html" style="text-decoration:none">
                <button class="nav-btn secondary">← Dashboard</button>
            </a>
            <button id="start-writing" class="nav-btn primary disabled" disabled>Start Writing →</button>
        </div>
    </div>

    <div id="editor-view" class="editor-view" style="display:none">
        <div class="editor-top-nav">
            <button class="nav-action-btn" id="back-btn">← Back</button>
            <span class="canvas-badge" id="badge"></span>
            <button class="nav-action-btn primary" id="save-btn">Save & Analyze ✓</button>
        </div>
        <div class="paper-container">
            <div id="editor"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const SUPABASE_URL=window._env.SUPABASE_URL;
        const SUPABASE_ANON_KEY=window._env.SUPABASE_ANON_KEY;
        const supabaseClient=window.__sb;

        const POS_WORDS=new Set(['happy','happiness','joy','joyful','glad','grateful','gratitude','thankful','love','loved','loving','hopeful','hope','peace','peaceful','calm','content','contented','proud','pride','excited','excitement','inspired','inspiration','motivated','motivation','amazing','wonderful','fantastic','great','good','excellent','beautiful','blessed','cheerful','delight','delighted','energised','energized','enthusiastic','optimistic','pleased','positive','radiant','refreshed','satisfied','uplifted','warm','bright','elated','ecstatic','confident','empowered','fulfilled','lively','playful','serene','sunny','thrilled','victorious','vibrant','alive','appreciative','brave','caring','creative','eager','free','generous','gentle','glowing','graceful','healing','honest','imaginative','kind','light','mindful','nurturing','open','patient','resilient','safe','strong','tender','trusting','whole','wise','fun','laugh','smile','smiling','enjoy','enjoyed','enjoying','celebrate','celebration','achievement','accomplish','accomplished','success','successful','progress','grow','growth','adventure']);
        const NEG_WORDS=new Set(['sad','sadness','angry','anger','tired','tiredness','stress','stressed','worry','worried','fear','fearful','lonely','loneliness','hurt','pain','painful','lost','dark','difficult','struggle','struggling','hopeless','anxious','anxiety','frustrated','frustration','overwhelmed','exhausted','exhaustion','upset','depressed','depression','nervous','scared','terrible','awful','horrible','miserable','disappointed','disappointment','annoyed','confused','helpless','weak','broken','cry','crying','tears','grief','grieving','regret','regretful','shame','ashamed','guilt','guilty','hate','hatred','bored','boredom','burned','burnout','chaos','chaotic','cruel','defeated','desperate','doubt','dread','dull','empty','fail','failure','gloomy','heavy','hollow','ignored','insecure','irritated','jealous','meaningless','numb','panicked','paralysed','paralyzed','powerless','rejection','resentment','restless','shattered','sorrow','stuck','suffering','tense','tension','tragic','trapped','troubled','uncertain','uncomfortable','unfair','unhappy','unloved','unworthy','useless','vulnerable','worthless','wrong','mistake','mistakes','hard','bad','worse','worst','never','cannot','alone','miss','missing']);

        function localAnalysis(text){
            const words=text.trim().split(/\s+/).filter(w=>w.length>0);
            const sentences=text.split(/[.!?]+/).filter(s=>s.trim().length>3);
            const uniqueSet=new Set(words.map(w=>w.toLowerCase().replace(/[^a-z]/g,'')));
            let posCount=0,negCount=0;
            const emotionWords=[];
            words.forEach(w=>{
                const clean=w.toLowerCase().replace(/[^a-z]/g,'');
                const forms=[clean,clean.replace(/ing$/,''),clean.replace(/ed$/,''),clean.replace(/ly$/,''),clean.replace(/ness$/,''),clean.replace(/s$/,'')];
                if(forms.some(f=>POS_WORDS.has(f))){posCount++;emotionWords.push(clean);}
                else if(forms.some(f=>NEG_WORDS.has(f))){negCount++;emotionWords.push(clean);}
            });
            let sentiment='Neutral';
            if(posCount>negCount*1.4)sentiment='Positive';
            else if(negCount>posCount*1.2)sentiment='Negative';
            const syllables=words.reduce((acc,w)=>{const c=w.toLowerCase().replace(/[^a-z]/g,'');return acc+Math.max(1,c.replace(/[^aeiouy]/g,'').length||1);},0);
            const sentLen=sentences.length>0?words.length/sentences.length:words.length;
            const syllPerWord=words.length>0?syllables/words.length:1;
            const readability=Math.max(0,Math.min(100,Math.round(206.835-1.015*sentLen-84.6*syllPerWord)));
            const wordFreq={};
            words.forEach(w=>{const c=w.toLowerCase().replace(/[^a-z]/g,'');if(c.length>3)wordFreq[c]=(wordFreq[c]||0)+1;});
            const repeatedWords=Object.entries(wordFreq).filter(([,v])=>v>2).map(([k])=>k).slice(0,5);
            const lexicalDiversity=words.length>0?parseFloat((uniqueSet.size/words.length).toFixed(2)):0;
            const wc=words.length||1;
            const sentimentScore=Math.max(0,Math.min(100,Math.round(50+((posCount-negCount)/wc)*50)));
            return{sentiment,wordCount:words.length,sentenceCount:sentences.length,uniqueWords:uniqueSet.size,mistakeCount:0,readability,positiveWordCount:posCount,negativeWordCount:negCount,neutralWordCount:Math.max(0,words.length-posCount-negCount),lexicalDiversity,sentimentScore,sentimentConfidence:0.6,emotionWords:[...new Set(emotionWords)].slice(0,10),repeatedWords,writingStyle:lexicalDiversity>0.7?'Expressive':lexicalDiversity>0.5?'Conversational':'Simple',grammarTrend:'Stable',vocabularyTrend:lexicalDiversity>0.65?'Improving':'Developing',progressSummary:`You wrote ${words.length} words across ${sentences.length} sentences with ${uniqueSet.size} unique words.`,moodLifter:sentiment==='Negative'?'Even the heaviest days carry something worth holding onto.':sentiment==='Positive'?'Your words carry warmth — keep that energy close.':'Every honest reflection is a step toward knowing yourself better.',vocabularySuggestions:[]};
        }

        const templates=[
            {id:'floral',name:'Floral Petals',icon:'🌸'},
            {id:'ruled',name:'Classic Ruled',icon:'📜'},
            {id:'midnight',name:'Midnight Blue',icon:'🌑'},
            {id:'parchment',name:'Old Parchment',icon:'📜'},
            {id:'lavender',name:'Lavender Mist',icon:'🌿'},
            {id:'minimal',name:'Pure Minimalist',icon:'⚪'},
            {id:'matcha',name:'Matcha Tea',icon:'🍵'},
            {id:'sunset',name:'Warm Sunset',icon:'🌇'},
            {id:'noir',name:'Noir Luxury',icon:'🎩'},
            {id:'ocean',name:'Deep Ocean',icon:'🌊'}
        ];

        const FONT_MAP={
            'times':'Times New Roman,Times,serif',
            'bookman':'Bookman Old Style,serif',
            'apple-chancery':'Apple Chancery,cursive',
            'big-caslon':'Big Caslon,serif',
            'bradley-hand':'Bradley Hand,cursive',
            'chalkduster':'Chalkduster,cursive',
            'copperplate':'Copperplate,serif',
            'impact':'Impact,sans-serif',
            'market-felt':'Market Felt,cursive',
            'luminari':'Luminari,fantasy',
            'noteworthy':'Noteworthy,sans-serif',
            'palatino':'Palatino,serif',
            'rockhand':'Rockwell,cursive',
            'snell-roundhand':'Snell Roundhand,cursive',
            'papyrus':'Papyrus,fantasy'
        };

        let selectedTemplate=null;
        let quill=null;

        function initCanvas(){
            const grid=document.getElementById('canvas-grid');
            const startBtn=document.getElementById('start-writing');
            if(!grid)return;

            templates.forEach(t=>{
                const div=document.createElement('div');
                div.className='canvas-square';
                div.innerHTML=`<div class="canvas-square-icon">${t.icon}</div><p>${t.name}</p>`;
                div.onclick=()=>{
                    document.querySelectorAll('.canvas-square').forEach(el=>el.classList.remove('active'));
                    div.classList.add('active');
                    selectedTemplate=t;
                    startBtn.disabled=false;
                    startBtn.classList.remove('disabled');
                };
                grid.appendChild(div);
            });

            const Parchment=Quill.import('parchment');
            const FontAttributor=new Parchment.Attributor.Style('font','font-family',{scope:Parchment.Scope.INLINE,whitelist:Object.keys(FONT_MAP)});
            FontAttributor.add=function(node,value){if(FONT_MAP[value]){node.style.fontFamily=FONT_MAP[value];return true;}return false;};
            FontAttributor.value=function(node){const f=node.style.fontFamily;if(!f)return false;const found=Object.keys(FONT_MAP).find(k=>FONT_MAP[k].split(',')[0].trim()===f.replace(/['"]/g,'').trim());return found||false;};
            Quill.register(FontAttributor,true);

            const Size=Quill.import('formats/size');
            Size.whitelist=['10px','11px','12px','13px','14px','15px','16px','17px','18px','19px','20px','21px','22px','23px','24px','25px','26px','27px','28px','29px','30px'];
            Quill.register(Size,true);

            quill=new Quill('#editor',{
                theme:'snow',
                modules:{
                    toolbar:[
                        [{'font':Object.keys(FONT_MAP)}],
                        [{'size':Size.whitelist}],
                        ['bold','italic','underline','strike'],
                        [{'color':[]},{'background':[]}],
                        [{'align':[]}],
                        ['clean']
                    ]
                }
            });

            const saveBtn=document.getElementById('save-btn');
            saveBtn.disabled=true;
            saveBtn.style.opacity='0.4';
            saveBtn.style.cursor='not-allowed';

            quill.on('text-change',()=>{
                const text=quill.getText().trim();
                if(text.length>10){
                    saveBtn.disabled=false;
                    saveBtn.style.opacity='1';
                    saveBtn.style.cursor='pointer';
                }else{
                    saveBtn.disabled=true;
                    saveBtn.style.opacity='0.4';
                    saveBtn.style.cursor='not-allowed';
                }
            });

            document.getElementById('start-writing').onclick=()=>{
                document.getElementById('picker-view').style.display='none';
                const editorView=document.getElementById('editor-view');
                editorView.style.display='block';
                editorView.className=`editor-view theme-${selectedTemplate.id}`;
                document.getElementById('badge').innerText=`${selectedTemplate.icon} ${selectedTemplate.name}`;
                localStorage.setItem('mindnook_canvas_name',selectedTemplate.name);
                localStorage.setItem('mindnook_canvas_id',selectedTemplate.id);
            };

            document.getElementById('back-btn').onclick=()=>{
                document.getElementById('editor-view').style.display='none';
                document.getElementById('picker-view').style.display='flex';
            };

            saveBtn.onclick=async()=>{
                const textContent=quill.getText().trim();
                if(textContent.length<20){alert('Please write at least a few sentences before saving.');return;}
                saveBtn.innerText='Analyzing…';
                saveBtn.disabled=true;
                saveBtn.style.opacity='0.6';
                saveBtn.style.cursor='not-allowed';
                const htmlContent=quill.root.innerHTML;
                localStorage.setItem('latestJournalText',textContent);

                const{data:{session}}=await supabaseClient.auth.getSession();
                if(!session){alert('Session expired. Please sign in again.');window.location.href='login.html';return;}

                if(window.MindNookBaseline){
                    try{await window.MindNookBaseline.syncGoalsFromSupabase(supabaseClient,session.user.id);}catch(e){}
                }

                let analysis=null;
                try{
                    const response=await fetch(`${SUPABASE_URL}/functions/v1/analyze-journal`,{
                        method:'POST',
                        headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
                        body:JSON.stringify({text:textContent})
                    });
                    if(!response.ok){throw new Error('edge_function_failed');}
                    const raw=await response.json();
                    analysis={
                        sentiment:raw.sentiment||'Neutral',
                        wordCount:raw.wordCount||textContent.split(/\s+/).length,
                        sentenceCount:raw.sentenceCount||textContent.split(/[.!?]+/).filter(s=>s.trim()).length,
                        uniqueWords:raw.uniqueWords||0,
                        mistakeCount:raw.mistakeCount||0,
                        readability:raw.readability||50,
                        positiveWordCount:raw.positiveWordCount||0,
                        negativeWordCount:raw.negativeWordCount||0,
                        neutralWordCount:raw.neutralWordCount||0,
                        lexicalDiversity:raw.lexicalDiversity||0,
                        sentimentScore:raw.sentimentScore||50,
                        sentimentConfidence:raw.sentimentConfidence||0.5,
                        emotionWords:raw.emotionWords||[],
                        repeatedWords:raw.repeatedWords||[],
                        writingStyle:raw.writingStyle||'',
                        grammarTrend:raw.grammarTrend||'',
                        vocabularyTrend:raw.vocabularyTrend||'',
                        progressSummary:raw.progressSummary||'',
                        moodLifter:raw.moodLifter||'',
                        vocabularySuggestions:raw.vocabularySuggestions||[]
                    };
                }catch(err){
                    analysis=localAnalysis(textContent);
                }

                analysis._rawText=textContent;

                let pragmatic=null;
                let temporalTrend=null;
                let goalAlignment=null;
                let utilityScore=null;

                try{
                    if(window.MindNookBaseline){
                        pragmatic=window.MindNookBaseline.classifyPragmatic(textContent);
                        analysis.pragmatic=pragmatic;

                        const{data:recentEntries}=await supabaseClient
                            .from('journal_entries')
                            .select('*')
                            .eq('user_id',session.user.id)
                            .order('created_at',{ascending:false})
                            .limit(20);

                        const entries=recentEntries||[];
                        temporalTrend=await window.MindNookBaseline.classifyTemporalTrend(entries,{supabaseUrl:SUPABASE_URL,accessToken:session.access_token,userId:session.user.id,mode:'read'});
                        goalAlignment=window.MindNookBaseline.computeGoalAlignment(analysis,entries);
                        analysis.temporalTrend=temporalTrend;
                        analysis.goalAlignment=goalAlignment;

                        const sentimentBaseline=window.MindNookBaseline.computeSentimentBaseline(entries);
                        if(sentimentBaseline){
                            const currentScore=analysis.sentimentScore||50;
                            const baselineDelta=window.MindNookBaseline.computePersonalBaselineDelta(currentScore,sentimentBaseline);
                            analysis.sentimentBaseline=sentimentBaseline;
                            analysis.sentimentBaselineDelta=baselineDelta;
                        }

                        if(pragmatic&&temporalTrend&&goalAlignment){
                            const cfpW=parseFloat(localStorage.getItem('mindnook_cfp')||'0.4');
                            const cfnW=parseFloat(localStorage.getItem('mindnook_cfn')||'0.6');
                            const wTask=parseFloat(localStorage.getItem('mindnook_w_task')||'0.4');
                            const wSafety=parseFloat(localStorage.getItem('mindnook_w_safety')||'0.35');
                            const lambdaPrivacy=parseFloat(localStorage.getItem('mindnook_lambda_privacy')||'0.15');
                            const lambdaAutonomy=parseFloat(localStorage.getItem('mindnook_lambda_autonomy')||'0.10');
                            const autonomyPref=parseFloat(localStorage.getItem('mindnook_autonomy_pref')||'0.5');
                            utilityScore=window.MindNookBaseline.buildUtilityScore(
                                {sentiment:analysis.sentiment,positiveWordCount:analysis.positiveWordCount,negativeWordCount:analysis.negativeWordCount},
                                pragmatic,temporalTrend,goalAlignment,
                                {cfp_weight:cfpW,cfn_weight:cfnW,w_task:wTask,w_safety:wSafety,lambda_privacy:lambdaPrivacy,lambda_autonomy:lambdaAutonomy,autonomy_preference:autonomyPref},
                                entries
                            );
                            const filteredAction=window.MindNookBaseline.applyEthicalFilter(utilityScore.action,entries,analysis);
                            utilityScore.action=filteredAction;
                        }
                    }
                }catch(layerErr){
                    console.warn('Layer computation failed (non-fatal):',layerErr.message);
                }

                localStorage.setItem('latestAnalysis',JSON.stringify(analysis));

                try{
                    const insertPayload={
                        user_id:session.user.id,
                        content:htmlContent,
                        sentiment:analysis.sentiment,
                        mood_lifter_content:analysis.moodLifter||'',
                        word_count:analysis.wordCount||0,
                        sentence_count:analysis.sentenceCount||0,
                        mistake_count:analysis.mistakeCount||0,
                        lexical_feedback:analysis.vocabularySuggestions||[],
                        unique_words:analysis.uniqueWords||0,
                        readability:analysis.readability||0,
                        writing_style:analysis.writingStyle||'',
                        grammar_trend:analysis.grammarTrend||'',
                        vocabulary_trend:analysis.vocabularyTrend||'',
                        progress_summary:analysis.progressSummary||'',
                        emotion_words:analysis.emotionWords||[],
                        repeated_words:analysis.repeatedWords||[],
                        positive_word_count:analysis.positiveWordCount||0,
                        negative_word_count:analysis.negativeWordCount||0,
                        neutral_word_count:analysis.neutralWordCount||0,
                        lexical_diversity:analysis.lexicalDiversity||0,
                        sentiment_score:analysis.sentimentScore||null,
                        sentiment_baseline_delta:analysis.sentimentBaselineDelta?.delta||null,
                        layer2_pragmatic:pragmatic||null,
                        layer3_temporal:temporalTrend||null,
                        layer4_goal:goalAlignment||null,
                        layer5_action:utilityScore||null,
                        layer5_breakdown:utilityScore?.breakdown||null,
                        layer_enrichment_status:'pending',
                        created_at:new Date().toISOString()
                    };
                    const{data,error}=await supabaseClient.from('journal_entries').insert([insertPayload]).select();
                    if(!error&&data&&data[0]){
                        const savedEntryId=data[0].id;
                        localStorage.setItem('mindnook_last_entry_id',savedEntryId);
                        try{
                            const storedGoals=JSON.parse(localStorage.getItem('mindnook_goals')||'[]');
                            const muUser=analysis.sentimentBaseline?.muUser||null;
                            const tauGoal=window.MindNookBaseline?window.MindNookBaseline.getTauGoal():0.6;
                            fetch(`${SUPABASE_URL}/functions/v1/temporal-lstm`,{
                                method:'POST',
                                headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
                                body:JSON.stringify({mode:'update',sentiment_score:analysis.sentimentScore||50,entry_id:savedEntryId})
                            }).catch(()=>{});
                            try{
                                const r=await fetch(`${SUPABASE_URL}/functions/v1/pragmatic-analysis`,{
                                    method:'POST',
                                    headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
                                    body:JSON.stringify({
                                        type:'combined',content:textContent,sentiment:analysis.sentiment,
                                        sentiment_score:analysis.sentimentScore||50,goals:storedGoals,
                                        entry_id:savedEntryId,trend_direction:temporalTrend?.direction||'neutral',
                                        trend_label:temporalTrend?.label||'stable',trend_slope:temporalTrend?.slope||0,
                                        cfp_weight:parseFloat(localStorage.getItem('mindnook_cfp')||'0.4'),
                                        cfn_weight:parseFloat(localStorage.getItem('mindnook_cfn')||'0.6'),
                                        w_task:parseFloat(localStorage.getItem('mindnook_w_task')||'0.4'),
                                        w_safety:parseFloat(localStorage.getItem('mindnook_w_safety')||'0.35'),
                                        lambda_privacy:parseFloat(localStorage.getItem('mindnook_lambda_privacy')||'0.15'),
                                        lambda_autonomy:parseFloat(localStorage.getItem('mindnook_lambda_autonomy')||'0.10'),
                                        autonomy_preference:parseFloat(localStorage.getItem('mindnook_autonomy_pref')||'0.5'),
                                        positive_word_count:analysis.positiveWordCount||0,
                                        negative_word_count:analysis.negativeWordCount||0,mu_user:muUser,
                                        tau_goal:tauGoal
                                    })
                                });
                                if(r.ok){
                                    const enriched=await r.json();
                                    if(enriched.pragmatic)analysis.pragmatic=enriched.pragmatic;
                                    if(enriched.layer5_action)analysis.utilityScore=enriched.layer5_action;
                                    if(enriched.layer5_action?.breakdown)analysis.utilityScoreBreakdown=enriched.layer5_action.breakdown;
                                    localStorage.setItem('latestAnalysis',JSON.stringify(analysis));
                                    const lowConfidenceGoal=enriched.goal?.lowConfidenceGoal;
                                    if(lowConfidenceGoal&&window.MindNookGoalClarification){
                                        await window.MindNookGoalClarification.renderClarificationPrompt(lowConfidenceGoal,{
                                            supabaseUrl:SUPABASE_URL,accessToken:session.access_token
                                        });
                                    }
                                }
                            }catch(e){}
                        }catch(e){}
                    }
                }catch(dbErr){
                    console.warn('DB insert failed (non-fatal):',dbErr.message);
                }

                localStorage.setItem('mindnook_last_entry_content',textContent);
                localStorage.setItem('mindnook_last_entry_sentiment',analysis.sentiment);
                window.location.href='sentiment.html';
            };
        }

        async function checkAuthAndInit(){
            const{data:{session}}=await supabaseClient.auth.getSession();
            if(!session){window.location.href='login.html';return;}
            window.__session=session;
            if(window.MindNookBaseline){
                try{await window.MindNookBaseline.syncGoalsFromSupabase(supabaseClient,session.user.id);}catch(e){}
            }
            initCanvas();
        }

        checkAuthAndInit();
    </script>
</body>
</html>
